apiVersion: v1
kind: Secret
metadata:
  name: amo-neo4j-auth
  namespace: amo
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/replace-with-strong-password"
---
apiVersion: v1
kind: Service
metadata:
  name: amo-neo4j
  namespace: amo
spec:
  selector:
    app: amo-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: amo-neo4j
  namespace: amo
spec:
  serviceName: amo-neo4j
  replicas: 1
  selector:
    matchLabels:
      app: amo-neo4j
  template:
    metadata:
      labels:
        app: amo-neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: amo-neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
            - name: NEO4J_server_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_server_memory_heap_max__size
              value: "1G"
            - name: NEO4J_server_memory_pagecache_size
              value: "512m"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 45
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: neo4j-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
