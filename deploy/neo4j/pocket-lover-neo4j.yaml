apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: pocket-lover
  labels:
    app: neo4j
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: docker.m.daocloud.io/neo4j:5.26-community
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        env:
        - name: NEO4J_AUTH
          value: "neo4j/replace-with-strong-password"
        - name: NEO4J_server_memory_heap_initial__size
          value: "512m"
        - name: NEO4J_server_memory_heap_max__size
          value: "1G"
        - name: NEO4J_server_memory_pagecache_size
          value: "512m"
        - name: NEO4J_server_default__listen__address
          value: "0.0.0.0"
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        volumeMounts:
        - name: neo4j-storage
          mountPath: /data
          subPath: neo4j/data
        - name: neo4j-storage
          mountPath: /logs
          subPath: neo4j/logs
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: neo4j-storage
        persistentVolumeClaim:
          claimName: pvc-cfs-jetdev-cache
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: pocket-lover
  labels:
    app: neo4j
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
  - name: http
    port: 7474
    targetPort: 7474
  - name: bolt
    port: 7687
    targetPort: 7687
